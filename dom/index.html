<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM Manipulation</title>
    <style>
      body {
        background-color: #1a1a1a;
        color: #e0e0e0;
        font-family: Arial, sans-serif;
        padding: 20px;
      }
      button {
        background-color: #333;
        color: #e0e0e0;
        border: 1px solid #555;
        padding: 8px 16px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Welcome to DOM Manipulation</h1>

    <button id="clickBtn">click me</button>

    <script>
      let buttonRef = window.document.getElementById("clickBtn");
      buttonRef.style.backgroundColor = "pink";

      buttonRef.addEventListener("click", onClickHandler);

      function onClickHandler() {
        buttonRef.remove();
        buttonRef = null;
      }
    </script>
  </body>
</html>
